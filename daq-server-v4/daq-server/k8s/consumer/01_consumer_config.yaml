apiVersion: v1
kind: Namespace
metadata:
  name: daq
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: consumer-config
  namespace: daq
data:
  KAFKA_BOOTSTRAP:        "kafka-0.kafka-headless.daq.svc.cluster.local:9092"
  KAFKA_GROUP_TELEMETRY:  "daq-consumer-telemetry"
  KAFKA_GROUP_SENSOR:     "daq-consumer-sensor"
  TOPIC_TELEMETRY:        "v.telemetry"
  TOPIC_SENSOR:           "v.sensor"
  MINIO_ENDPOINT:         "http://192.168.1.150:9000"
  MINIO_BUCKET:           "ingest-bucket"
  MCAP_FLUSH_FRAMES:      "300"
  MCAP_FLUSH_SECONDS:     "30"
  MAX_PENDING_FRAMES:     "1000"
  PARQUET_FLUSH_ROWS:     "1000"
  PARQUET_FLUSH_SECONDS:  "60"
  MAX_PENDING_ROWS:       "5000"
---
apiVersion: v1
kind: Secret
metadata:
  name: consumer-secret
  namespace: daq
type: Opaque
stringData:
  MINIO_ACCESS_KEY: "daq_access_key"   # 실제 키로 교체
  MINIO_SECRET_KEY: "daq_secret_key"   # 실제 키로 교체
