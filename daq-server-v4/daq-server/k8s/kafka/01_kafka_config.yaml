apiVersion: v1
kind: Namespace
metadata:
  name: daq
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: daq
data:
  # KRaft 모드 (ZooKeeper 없음)
  KAFKA_KRAFT_MODE: "true"
  KAFKA_PROCESS_ROLES: "broker,controller"
  KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-0.kafka-headless.daq.svc.cluster.local:9093"
  KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
  KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
  KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
  KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-0.kafka-headless.daq.svc.cluster.local:9092,EXTERNAL://192.168.1.81:9094"
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
  KAFKA_LOG_RETENTION_HOURS: "168"          # 7일
  KAFKA_LOG_SEGMENT_BYTES: "1073741824"     # 1GB
  KAFKA_MESSAGE_MAX_BYTES: "10485760"       # 10MB
  KAFKA_REPLICA_FETCH_MAX_BYTES: "10485760"
  KAFKA_NUM_PARTITIONS: "16"
  KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
  KAFKA_LOG_DIRS: "/var/lib/kafka/data"
  KAFKA_HEAP_OPTS: "-Xmx4G -Xms4G"
