apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: daq
spec:
  clusterIP: None
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
    - name: controller
      port: 9093
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-external
  namespace: daq
spec:
  type: NodePort
  selector:
    app: kafka
  ports:
    - name: external
      port: 9094
      nodePort: 9094   # daq-edge 차량에서 접근하는 포트
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: daq
spec:
  serviceName: kafka-headless
  replicas: 1          # 단일 브로커, 스케일 필요시 3으로
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      nodeSelector:
        daq-role: kafka   # 192.168.1.81 에 스케줄
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          ports:
            - containerPort: 9092
            - containerPort: 9093
            - containerPort: 9094
          envFrom:
            - configMapRef:
                name: kafka-config
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: CLUSTER_ID
              value: "daq-kafka-cluster-v1"  # uuid 고정
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "8Gi"
              cpu: "4"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path   # 로컬 SSD 사용
        resources:
          requests:
            storage: 500Gi
