apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: daq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      nodeSelector:
        daq-role: kafka
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:latest
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: "daq-cluster"
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: "kafka-0.kafka-headless.daq.svc.cluster.local:9092"
          resources:
            requests:
              memory: "512Mi"
              cpu: "0.5"
            limits:
              memory: "1Gi"
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: daq
spec:
  type: NodePort
  selector:
    app: kafka-ui
  ports:
    - port: 8080
      nodePort: 30080   # http://192.168.1.81:30080
